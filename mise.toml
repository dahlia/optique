[settings]
experimental = true

[tools]
"aqua:fish-shell/fish-shell" = "latest"
bun = "1.3"
deno = "2.8"
"github:dahlia/sacho" = "0.1.0"
"github:PowerShell/PowerShell" = "latest"
"github:nushell/nushell" = "latest"
"github:pnpm/pnpm" = "11"
node = "26"

[tools."github:dahlia/hongdown"]
version = "0.5"

[tools."github:dahlia/hongdown".platforms]
linux-x64 = "hongdown-*-x86_64-unknown-linux-musl.tar.bz2"
linux-arm64 = "hongdown-*-aarch64-unknown-linux-musl.tar.bz2"

[deps.deno]
auto = true

[deps.pnpm]
auto = true

[hooks.postinstall]
shell = "nu -c"
run = """
mise deps
mise generate git-pre-commit --write --task=check
'#!/bin/sh
sacho hook-commit-msg "$1"' | save --force .git/hooks/commit-msg
'#!/bin/sh
if test "$1" = prepared; then
  sacho_state=$(git rev-parse --git-path sacho-commit-state) || exit $?
  if test -f "$sacho_state"; then
    sacho hook-reference-transaction "$1"
  fi
fi' | save --force .git/hooks/reference-transaction
if $nu.os-info.name != 'windows' {
  chmod +x .git/hooks/commit-msg .git/hooks/reference-transaction
}
sacho init --no-interactive
"""

[tasks.check]
description = "Check code formatting, linting, and type checking"
depends = ["check:*"]
run = "sacho check"

[tasks."check:versions"]
description = "Check that all subpackages have matching versions"
usage = '''
flag "--fix" help="Automatically fix version mismatches"
'''
shell = "nu -c"
run = '''
if $env.usage_fix? == "true" {
  deno task check-versions --fix
} else {
  deno task check-versions
}
'''

[tasks."check:type"]
description = "Check TypeScript code"
run = "deno check"

[tasks."check:lint"]
description = "Check lint"
run = "deno lint"

[tasks."check:fmt"]
description = "Check source format (except for Markdown docs)"
run = "deno fmt --check"

[tasks."check:fmt-md"]
description = "Check Markdown docs format"
run = "hongdown --check"

[tasks."check:publish"]
description = "Check if publishing is ready"
run = "deno publish --dry-run --allow-dirty"

[tasks.fmt]
description = "Format source files"
run = ["deno fmt", "hongdown --write", "mise fmt"]

[tasks."test:deno"]
description = "Run the test suite using Deno"
run = "deno task test"

[tasks."test:node"]
description = "Run the test suite using Node.js"
depends = ["build"]
run = "pnpm run -r test"

[tasks."test:bun"]
description = "Run the test suite using Bun"
depends = ["build"]
run = "pnpm run -r test:bun"

[tasks.test]
description = "Run the test suite across all environments"
depends = ["check", "test:*"]

[tasks.build]
description = "Build all packages for npm publishing"
run = "pnpm run --filter '!{docs}' -r build"

[tasks.coverage]
description = "Measure test coverage"
run = [
  "deno test --allow-read --allow-write --allow-run --allow-env --allow-net --allow-sys --allow-ffi --env-file=.env.test --coverage=coverage/raw",
  'deno coverage coverage/raw --lcov --include="packages/" --output=coverage/lcov.info',
  'deno coverage coverage/raw --include="packages/"',
]
